
# docker run -p 80:80 --add-host host.docker.internal:host-gateway \
#   -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf \
#   -v $(pwd)/public:/usr/share/nginx/html/public \
#   nginx:latest

user nginx;

error_log /var/log/nginx/error.log info;
pid /var/run/nginx.pid;

worker_processes 2;

events {
    worker_connections 64;
}

http {
    access_log /var/log/nginx/access.log;
    log_format simple '$remote_addr $request $status';

    upstream gunicorn {
        # server 127.0.0.1:8090;
        # server 127.17.0.1:8090;
        # server localhost:8090;
        server host.docker.internal:8090;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html/;
            index index.html;
        }

        location /public/ {
            alias /usr/share/nginx/html/public/;
            autoindex on; #Каталог файлов для удобства
        }

        location /gunicorn/ {
            proxy_pass http://gunicorn;
            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /partner/ {
            proxy_pass https://mai.ru;
        }
    }
}
